aid: fluxx-grants
url: https://raw.githubusercontent.com/api-evangelist/fluxx-grants/refs/heads/main/apis.yml
name: Fluxx
kind: company
description: Fluxx is a cloud grants management platform for foundations, government
  agencies, corporations, and nonprofits, covering the full grant lifecycle from
  funding announcement through pre-award applications, post-award payments, and
  measurement and evaluation. Fluxx Grantmaker includes a RESTful API (REST API v2)
  available to customers for building custom integrations with financial, CRM, and
  business-intelligence systems. The API is exposed per-client on each customer's
  own Fluxx instance under https://{client}.fluxx.io/api/rest/v2, is authenticated
  with OAuth 2.0 credentials created in that instance, and is driven by a dynamic,
  instance-specific data model whose reference documentation is generated at
  /api/rest/v2/doc for each deployment. Because the surface is per-instance and
  gated behind an authenticated customer deployment, the endpoints below are
  honestly modeled from Fluxx's documented REST v2 conventions rather than pulled
  from a single public reference.
